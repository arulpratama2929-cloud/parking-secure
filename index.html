<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateIN - Smart Access System</title>

<style>
body {
    margin: 0;
    padding-top: 60px;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    z-index: 1000;
}

.navbar a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.navbar a:hover,
.navbar a.active {
    color: #00aeef;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #001f2f, #000);
    text-align: center;
}

.hero h1 {
    font-size: 48px;
    color: #00aeef;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #00aeef;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* SECTION */
.section {
    padding: 60px 20px;
    text-align: center;
}

/* FEATURES */
.features {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.feature {
    width: 250px;
    margin: 15px;
    padding: 20px;
    background: #111;
    border-radius: 10px;
}

/* CTA */
.cta {
    background: #001f2f;
    padding: 50px;
}

.footer {
    background: black;
    padding: 20px;
    text-align: center;
}

html {
    scroll-behavior: smooth;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">Tentang</a>
    <a href="#fitur">Fitur</a>
    <a href="#cara">Cara</a>
    <a href="#cta">Kontak</a>
</div>

<!-- HERO -->
<section class="hero" id="home">
    <h1>GateIN</h1>
    <p>Smart Access System modern & otomatis</p>
    <button class="btn" onclick="document.getElementById('cta').scrollIntoView()">Lihat Demo</button>
</section>

<!-- ABOUT -->
<section class="section" id="about">
    <h2>Tentang Produk</h2>
    <p>Sistem gerbang otomatis tanpa petugas, cepat dan aman.</p>
</section>

<!-- FEATURES -->
<section class="section" id="fitur">
    <h2>Fitur</h2>
    <div class="features">
        <div class="feature">🚗 Otomatis</div>
        <div class="feature">🚶 Pejalan kaki</div>
        <div class="feature">📡 RFID</div>
        <div class="feature">🔒 Aman</div>
    </div>
</section>

<!-- CARA -->
<section class="section" id="cara">
    <h2>Cara Kerja</h2>
    <p>Akses → Scan → Terbuka otomatis</p>
</section>

<!-- CTA -->
<section class="cta" id="cta">
    <h2>Hubungi Kami</h2>
    <button class="btn" onclick="window.open('https://wa.me/6281234567890')">
        WhatsApp
    </button>
</section>

<div class="footer">
    © 2026 GateIN
</div>

<script>
// NAVBAR ACTIVE
const sections = document.querySelectorAll("section");
const navLinks = document.querySelectorAll(".navbar a");

window.addEventListener("scroll", () => {
  let current = "";

  sections.forEach(section => {
    const sectionTop = section.offsetTop;
    if (pageYOffset >= sectionTop - 100) {
      current = section.getAttribute("id");
    }
  });

  navLinks.forEach(a => {
    a.classList.remove("active");
    if (a.getAttribute("href") == "#" + current) {
      a.classList.add("active");
    }
  });
});
</script>

</body>
</html>
